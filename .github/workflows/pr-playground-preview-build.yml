name: PR Playground Preview - Build

# Step 1 of 2 for the WordPress Playground PR preview button.
#
# Runs on every PR (including PRs from forks) with read-only permissions and
# no access to repository secrets. Its only job is to produce a production
# build of Plugin Check (PHP dependencies installed, dev files excluded) and
# upload it as a workflow artifact named so the privileged publish workflow
# can find it later.
#
# See pr-playground-preview-publish.yml for the second half and:
# https://github.com/WordPress/action-wp-playground-pr-preview/tree/v2

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  build-plugin-zip:
    name: Build plugin zip for Playground preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # Untrusted code from forks may run here, so don't persist git
          # credentials and don't grant any write scope.
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install production Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-progress

      - name: Build plugin zip honouring .distignore
        env:
          PLUGIN_SLUG: plugin-check
        run: |
          # Re-create the WordPress.org-style distribution layout: a single
          # top-level directory named after the plugin slug, containing every
          # file NOT listed in .distignore. We use rsync with --exclude-from
          # because .distignore is the canonical exclusion list for this repo
          # and is already used by the deploy workflow.
          mkdir -p "build/${PLUGIN_SLUG}"
          rsync -a --delete \
            --exclude-from='.distignore' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            ./ "build/${PLUGIN_SLUG}/"

          cd build
          zip -qr "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}"
          ls -lh "${PLUGIN_SLUG}.zip"

      - name: Upload plugin zip artifact
        uses: actions/upload-artifact@v4
        with:
          # Name encodes the PR number + commit SHA so the publish workflow
          # (running on workflow_run) can map the artifact back to its PR.
          name: plugin-check-zip-pr${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: build/plugin-check.zip
          if-no-files-found: error
          retention-days: 5
