name: Playground PR Preview

# Posts (or updates) a sticky comment on each pull request with a one-click
# link that boots WordPress Playground with this PR's build of Plugin Check
# already installed, activated and landing the reviewer on the Plugin Check
# admin screen.
#
# The blueprint consumed by this link is produced by build-dist.yml on the
# matching `dist/<branch>` branch.

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  playground-preview:
    name: Comment with Playground preview link
    runs-on: ubuntu-latest
    steps:
      - name: Post Playground preview comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Marker is intentionally unique to this repo so adopting the
            // same pattern elsewhere does not collide with our comment.
            const marker = '<!-- plugin-check-playground-preview -->';

            const issue_number = context.payload.pull_request.number;
            const branchName   = context.payload.pull_request.head.ref;
            const headRepo     = context.payload.pull_request.head.repo.full_name;
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;

            const branchEnc = encodeURIComponent(branchName);
            const blueprintUrl = `https://raw.githubusercontent.com/${headRepo}/dist/${branchEnc}/.wordpress-playground/blueprint.json`;
            const playgroundUrl = `https://playground.wordpress.net/?blueprint-url=${encodeURIComponent(blueprintUrl)}`;

            const body = [
              marker,
              '## 🧪 Test this PR in WordPress Playground',
              '',
              `[**Open PR #${issue_number} in Playground ↗**](${playgroundUrl})`,
              '',
              '> The link becomes active once the **Build dist branch** workflow finishes for this PR\'s head branch.',
              '',
              '- Logs you in automatically as `admin` / `password`.',
              '- Installs and activates **this PR\'s build of Plugin Check**.',
              '- Lands you on **Tools → Plugin Check** so you can run a check immediately.',
              '',
              '<sub>Note: for PRs from forks, the dist branch is built on the fork and the preview link points there.</sub>',
            ].join('\n');

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 }
            );

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
